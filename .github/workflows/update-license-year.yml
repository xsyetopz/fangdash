name: Update License Year

on:
  schedule:
    # January 1st at midnight CST (06:00 UTC)
    - cron: "0 6 1 1 *"
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  update-year:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get current year
        id: year
        run: echo "value=$(date +%Y)" >> "$GITHUB_OUTPUT"

      - name: Update copyright year
        run: sed -i "s/Copyright (c) [0-9]\{4\}/Copyright (c) ${{ steps.year.outputs.value }}/" LICENSE

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet LICENSE; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.diff.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v7
        with:
          commit-message: "chore: update license year to ${{ steps.year.outputs.value }}"
          title: "chore: update MIT license year to ${{ steps.year.outputs.value }}"
          body: |
            Automated annual update of the copyright year in the MIT LICENSE file.

            🤖 Generated by the `update-license-year` workflow.
          branch: chore/update-license-year
          delete-branch: true
